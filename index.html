<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Stream Player</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jwplayer.com/libraries/IDzF9Zmk.js"></script>
<link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
–accent:       #e50914;
–accent-h:     #ff2233;
–bg:           #0a0a0a;
–surface:      rgba(255,255,255,0.06);
–border:       rgba(255,255,255,0.10);
–text:         #ffffff;
–text-dim:     rgba(255,255,255,0.55);
–success:      #22c55e;
–warning:      #f59e0b;
–font:         ‘DM Sans’, system-ui, sans-serif;
–radius:       10px;
–btn-h:        36px;
–ease:         cubic-bezier(0.4, 0, 0.2, 1);
}

html, body {
width: 100%; height: 100%; overflow: hidden;
background: var(–bg); font-family: var(–font); color: var(–text);
}

/* ── Layout ───────────────────────────────────────────────────── */
#app {
display: flex;
flex-direction: column;
width: 100%; height: 100%;
}

/* ── Stream Button Bar (ABOVE video) ─────────────────────────── */
#stream-bar {
flex-shrink: 0;
display: none;
align-items: center;
gap: 6px;
padding: 8px 12px;
background: #111;
border-bottom: 1px solid var(–border);
overflow-x: auto;
scrollbar-width: none;
-webkit-overflow-scrolling: touch;
}
#stream-bar::-webkit-scrollbar { display: none; }
#stream-bar.visible { display: flex; }

.stream-btn {
display: inline-flex;
align-items: center;
gap: 5px;
padding: 0 12px;
height: var(–btn-h);
border-radius: var(–radius);
border: 1px solid var(–border);
background: var(–surface);
color: var(–text-dim);
font-family: var(–font);
font-size: 12px;
font-weight: 600;
white-space: nowrap;
cursor: pointer;
flex-shrink: 0;
transition: color .18s var(–ease), background .18s var(–ease), border-color .18s var(–ease);
-webkit-tap-highlight-color: transparent;
user-select: none;
}
.stream-btn:hover { color: var(–text); background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); }
.stream-btn.active {
color: var(–text);
background: rgba(229,9,20,0.15);
border-color: var(–accent);
}
.stream-btn .s-num {
width: 18px; height: 18px;
border-radius: 5px;
background: rgba(255,255,255,0.12);
font-size: 10px; font-weight: 700;
display: flex; align-items: center; justify-content: center;
flex-shrink: 0;
transition: background .18s;
}
.stream-btn.active .s-num { background: var(–accent); color: #fff; }

/* ── Stage (video area) ───────────────────────────────────────── */
#stage {
position: relative;
flex: 1;
background: #000;
overflow: hidden;
min-height: 0;
}

#main-iframe, #player-host {
position: absolute; inset: 0;
width: 100%; height: 100%;
border: none; background: #000;
}
#player-host { display: none; z-index: 2; }
#main-iframe  { z-index: 1; display: none; }

/* ── Embed Host ───────────────────────────────────────────────── */
#embed-host {
position: absolute; inset: 0; z-index: 3;
display: none; flex-direction: column;
background: #000;
}
#embed-host.active { display: flex; }

/* Shimmer loader */
#embed-shimmer {
position: absolute; inset: 0; z-index: 4;
background: linear-gradient(110deg, #111 25%, #1a1a1a 37%, #111 63%);
background-size: 400% 100%;
animation: shimmer 1.4s ease infinite;
display: flex; flex-direction: column;
justify-content: center; align-items: center; gap: 14px;
transition: opacity .3s;
}
#embed-shimmer.hidden { opacity: 0; pointer-events: none; }
@keyframes shimmer { 0%{background-position:100% 50%} 100%{background-position:0% 50%} }
.shimmer-icon  { font-size: 32px; opacity: .3; }
.shimmer-text  { color: var(–text-dim); font-size: 12px; letter-spacing: .08em; text-transform: uppercase; }
.shimmer-track { width: 120px; height: 2px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; }
.shimmer-fill  { height: 100%; width: 0%; background: var(–accent); border-radius: 2px; transition: width .5s ease; }

#embed-frame {
position: absolute; inset: 0; width: 100%; height: 100%;
border: none; background: #000; z-index: 3;
opacity: 0; transition: opacity .5s;
}
#embed-frame.visible { opacity: 1; }

/* ── Friendly Error Panel (embed) ─────────────────────────────── */
#embed-error {
position: absolute; inset: 0; z-index: 6;
background: rgba(0,0,0,0.92);
display: none; flex-direction: column;
justify-content: center; align-items: center;
gap: 12px; padding: 24px; text-align: center;
}
#embed-error.active { display: flex; }
.ee-icon  { font-size: 40px; }
.ee-title { font-size: 15px; font-weight: 700; color: var(–text); }
.ee-msg   { font-size: 13px; color: var(–text-dim); max-width: 320px; line-height: 1.6; }
.ee-actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-top: 4px; }

/* ── Buttons ──────────────────────────────────────────────────── */
.btn {
display: inline-flex; align-items: center; gap: 6px;
padding: 0 16px; height: var(–btn-h);
border-radius: var(–radius); border: 1px solid var(–border);
background: var(–surface); color: var(–text);
font-family: var(–font); font-size: 12px; font-weight: 600;
cursor: pointer; white-space: nowrap;
transition: background .18s var(–ease), border-color .18s var(–ease), transform .15s var(–ease);
-webkit-tap-highlight-color: transparent; user-select: none;
}
.btn:hover  { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.22); }
.btn:active { transform: scale(0.97); }
.btn.primary { background: var(–accent); border-color: var(–accent); }
.btn.primary:hover { background: var(–accent-h); border-color: var(–accent-h); }
.btn svg { width: 14px; height: 14px; flex-shrink: 0; }

/* ── HUD (top bar, minimal) ───────────────────────────────────── */
#hud {
position: absolute; top: 0; left: 0; right: 0; z-index: 10;
padding: 12px 14px;
background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, transparent 100%);
display: flex; justify-content: space-between; align-items: center; gap: 10px;
pointer-events: none;
}
#live-badge {
display: flex; align-items: center; gap: 7px;
background: rgba(0,0,0,0.5); border: 1px solid var(–border);
backdrop-filter: blur(12px); padding: 5px 12px; border-radius: 100px;
pointer-events: auto; opacity: 0; transition: opacity .3s;
}
#live-badge.visible { opacity: 1; }
.live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(–accent); animation: pulse 1.6s ease-in-out infinite; flex-shrink: 0; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.3;transform:scale(.7)} }
#badge-label { font-size: 11px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: var(–text); }

#hud-actions { display: flex; gap: 6px; pointer-events: auto; }

/* ── Loading overlay ──────────────────────────────────────────── */
#loading {
position: absolute; inset: 0; z-index: 20;
background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
display: none; flex-direction: column;
justify-content: center; align-items: center; gap: 14px;
pointer-events: none;
}
#loading.active { display: flex; }
.spinner {
width: 40px; height: 40px;
border: 3px solid rgba(255,255,255,0.12);
border-top-color: var(–accent);
border-radius: 50%;
animation: spin .75s linear infinite;
}
@keyframes spin { to{transform:rotate(360deg)} }
#load-text { color: var(–text-dim); font-size: 12px; font-weight: 500; letter-spacing: .04em; }

/* ── Auto-retry bar ───────────────────────────────────────────── */
#retry-bar {
position: absolute; bottom: 0; left: 0; right: 0; z-index: 18;
background: rgba(229,9,20,0.12); border-top: 1px solid rgba(229,9,20,0.3);
display: none; align-items: center; justify-content: center; gap: 10px;
padding: 10px 14px; font-size: 12px; color: var(–text);
}
#retry-bar.active { display: flex; }
#retry-bar .r-spinner {
width: 14px; height: 14px;
border: 2px solid rgba(255,255,255,0.2);
border-top-color: var(–accent);
border-radius: 50%;
animation: spin .75s linear infinite;
flex-shrink: 0;
}
#retry-msg { color: var(–text-dim); }

/* ── Friendly error (main) ────────────────────────────────────── */
#error-panel {
position: absolute; inset: 0; z-index: 21;
background: rgba(0,0,0,0.88); backdrop-filter: blur(8px);
display: none; flex-direction: column;
justify-content: center; align-items: center;
gap: 10px; padding: 24px; text-align: center;
}
#error-panel.active { display: flex; }
.ep-icon  { font-size: 44px; margin-bottom: 2px; }
.ep-title { font-size: 16px; font-weight: 700; color: var(–text); }
.ep-msg   { font-size: 13px; color: var(–text-dim); max-width: 340px; line-height: 1.65; }
.ep-actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-top: 8px; }
.ep-hint {
font-size: 11px; color: var(–text-dim);
background: rgba(255,255,255,0.04);
border: 1px solid var(–border);
border-radius: 8px; padding: 8px 14px;
max-width: 320px; line-height: 1.6;
}

/* ── Playback controls (bottom overlay) ──────────────────────── */
#playback-bar {
position: absolute; bottom: 0; left: 0; right: 0; z-index: 15;
background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 100%);
padding: 32px 14px 12px 14px;
display: none;
opacity: 0;
transition: opacity .22s var(–ease);
pointer-events: none;
}
#stage.overlay-active #playback-bar { display: block; }
#stage.overlay-active #playback-bar.show { opacity: 1; pointer-events: auto; }

.pb-row {
display: flex; align-items: center; gap: 8px;
flex-wrap: wrap;
}

/* quality selector */
#quality-select {
height: var(–btn-h);
background: rgba(0,0,0,0.5);
border: 1px solid var(–border);
backdrop-filter: blur(12px);
color: var(–text);
padding: 0 10px;
border-radius: var(–radius);
font-family: var(–font); font-size: 11px; font-weight: 600;
cursor: pointer;
display: none; /* hidden until qualities load */
}
#quality-select.has-levels { display: block; }
#quality-select option { background: #1a1a1a; }

/* volume */
#vol-slider {
width: 80px; height: 4px;
background: rgba(255,255,255,0.18);
border-radius: 2px; cursor: pointer;
-webkit-appearance: none; appearance: none;
}
#vol-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; background: #fff; border-radius: 50%; cursor: pointer; }
#vol-slider::-moz-range-thumb { width: 12px; height: 12px; background: #fff; border-radius: 50%; cursor: pointer; border: none; }

.vol-label { font-size: 10px; color: var(–text-dim); white-space: nowrap; }

/* ── Toast ────────────────────────────────────────────────────── */
#toast {
position: absolute; bottom: 60px; left: 50%;
transform: translateX(-50%) translateY(14px);
z-index: 30;
background: rgba(20,20,20,0.9);
border: 1px solid var(–border);
backdrop-filter: blur(14px);
color: var(–text); font-size: 12px; font-weight: 500;
padding: 7px 18px; border-radius: 100px;
white-space: nowrap; opacity: 0;
transition: opacity .25s, transform .25s;
pointer-events: none;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── Center play ─────────────────────────────────────────────── */
#center-play {
position: absolute; top: 50%; left: 50%;
transform: translate(-50%, -50%);
z-index: 16; width: 64px; height: 64px;
border-radius: 50%;
background: rgba(0,0,0,0.55);
border: 2px solid rgba(255,255,255,0.25);
backdrop-filter: blur(8px);
display: none; justify-content: center; align-items: center;
cursor: pointer;
transition: background .2s, transform .2s;
}
#center-play:hover { background: rgba(229,9,20,0.7); transform: translate(-50%, -50%) scale(1.08); }
#center-play svg { width: 28px; height: 28px; fill: #fff; margin-left: 4px; }
#center-play.visible { display: flex; }

/* ── Init placeholder ─────────────────────────────────────────── */
#init-placeholder {
position: absolute; inset: 0; z-index: 5;
display: flex; justify-content: center; align-items: center;
background: #000;
}
#init-placeholder p { color: rgba(255,255,255,0.3); font-size: 13px; letter-spacing: .04em; }

/* ── Gesture hint ─────────────────────────────────────────────── */
#gesture-hint {
position: absolute; bottom: 58px; left: 50%; transform: translateX(-50%);
z-index: 14;
background: rgba(0,0,0,0.55); border: 1px solid var(–border);
backdrop-filter: blur(12px);
color: var(–text-dim); font-size: 11px;
padding: 6px 14px; border-radius: 100px;
opacity: 0; transition: opacity .3s; pointer-events: none; white-space: nowrap;
}
#gesture-hint.show { opacity: 1; }

/* ── Fallback wrap ────────────────────────────────────────────── */
.fallback-wrap {
position: absolute; inset: 0;
display: flex; flex-direction: column;
justify-content: center; align-items: center;
gap: 16px; padding: 24px; background: #0a0a0a;
}
.fallback-wrap p { color: var(–text-dim); font-size: 13px; text-align: center; }
.fallback-wrap .fw-title { color: var(–accent); font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; }
.fallback-wrap iframe {
width: 100%; max-width: 800px;
height: min(400px, 58vh);
border-radius: 12px;
border: 1px solid var(–border);
}

/* ── Responsive ───────────────────────────────────────────────── */
@media (max-width: 600px) {
#stream-bar { padding: 6px 10px; gap: 5px; }
.stream-btn { padding: 0 10px; height: 32px; font-size: 11px; gap: 4px; }
.stream-btn .s-num { width: 16px; height: 16px; font-size: 9px; }
#hud { padding: 10px 12px; }
.btn { padding: 0 12px; height: 32px; font-size: 11px; }
#vol-slider { width: 60px; }
}
@media (max-width: 380px) {
.stream-btn .s-name { display: none; }
.stream-btn { padding: 0 9px; }
}
</style>

</head>

<script>
'use strict';

/* ─── Silence benign errors ───────────────────────────────────────── */
window.onerror = (msg, src, line, col, err) => {
  if (['owlCarousel','replaceText','__cmp','googletag'].some(s => String(msg).includes(s))) return true;
};
window.addEventListener('unhandledrejection', e => {
  const m = String(e?.reason?.message || e?.reason || '');
  if (m.includes('AbortError') || m.includes('play() request')) e.preventDefault();
});

/* ─── Helpers ──────────────────────────────────────────────────────── */
const $ = id => document.getElementById(id);
function makeAbortSignal(ms) {
  const c = new AbortController();
  c._t = setTimeout(() => c.abort(), ms);
  return c;
}
function isIOS() {
  return /iphone|ipad|ipod/i.test(navigator.userAgent) ||
    (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
}
function isSafeUrl(url) {
  if (!url || typeof url !== 'string') return false;
  const t = url.trim();
  if (t.length < 10 || t.length > 2048) return false;
  if (/^(javascript|data|blob|vbscript|file):/i.test(t)) return false;
  try {
    const p = new URL(t);
    if (!['http:','https:'].includes(p.protocol)) return false;
    if (!p.hostname || p.hostname.length < 3) return false;
    return true;
  } catch { return false; }
}
function decodeParams(name) {
  const raw = new URLSearchParams(location.search);
  const enc = raw.get('data');
  if (enc) { try { const d = JSON.parse(atob(enc)); if (d[name]) return [].concat(d[name]); } catch {} }
  return raw.getAll(name);
}
function withTimeout(p, ms = 14000) {
  let t;
  const race = new Promise((_, rej) => { t = setTimeout(() => rej(new Error('Timed out')), ms); });
  return Promise.race([p.finally(() => clearTimeout(t)), race]);
}
async function withRetry(fn, tries = 2, delay = 900) {
  for (let i = 0; i <= tries; i++) {
    try { return await fn(); } catch (e) { if (i === tries) throw e; await new Promise(r => setTimeout(r, delay * (i + 1))); }
  }
}

/* ─── Config ───────────────────────────────────────────────────────── */
const CFG = {
  FALLBACK_URL:    'https://sports803livestream.blogspot.com/p/in-event.html?embed=https://sportzonline.top/channels/hd/hd3.php',
  STORAGE_KEY:     'sp_idx',
  CACHE_PFX:       'sp_c_',
  CACHE_TTL:       5 * 60 * 1000,
  PLAYER_TIMEOUT:  14000,
  MAX_RETRIES:     2,
  EMBED_TIMEOUT:   15000,
  GESTURE_MIN:     60,
  PROXY_FACTORIES: [
    u => `https://corsproxy.io/?url=${encodeURIComponent(u)}`,

/* ─── Embed Manager ─────────────────────────────────────────────────── */
const Embed = (() => {
  let sources = [], srcIdx = 0, gen = 0;
  let loadTimer = null, shimInt = null, frame = null;

  function shimStart() {
    D.shimmer.classList.remove('hidden');
    D.shimFill.style.width = '0%';
    let p = 0;
    shimInt = setInterval(() => {
      const step = p < 50 ? 4 : p < 80 ? 1.5 : 0;
      p = Math.min(82, p + step);
      D.shimFill.style.width = p + '%';
    }, 250);
  }
  function shimEnd(ok) {
    clearInterval(shimInt); shimInt = null;
    D.shimFill.style.width = ok ? '100%' : '30%';
    setTimeout(() => D.shimmer.classList.add('hidden'), 320);
  }
  function showErr(icon, title, msg, canNext) {
    D.eeIcon.textContent  = icon;
    D.eeTitle.textContent = title;
    D.eeMsg.textContent   = msg;
    D.eeNextBtn.style.display = (canNext && sources.length > 1) ? '' : 'none';
    D.embedErr.classList.add('active');
  }
  function hideErr() { D.embedErr.classList.remove('active'); }

  function loadSrc(idx, g) {
    if (g != null && g !== gen) return;
    srcIdx = idx;
    hideErr();
    const url = sources[idx];
    if (!url) { showErr('🔗', 'No source', 'This source URL is missing.', false); return; }
    clearTimeout(loadTimer);
    shimStart();

    const fresh = D.embedFrame.cloneNode(false);
    fresh.id = 'embed-frame';
    fresh.setAttribute('sandbox', CFG.SANDBOX);
    fresh.setAttribute('allow', 'autoplay; encrypted-media; fullscreen; picture-in-picture');
    fresh.setAttribute('referrerpolicy', 'no-referrer-when-downgrade');
    D.embedFrame.replaceWith(fresh);
    D.embedFrame = fresh;
    frame = fresh;

    // Wire events
    const curGen = gen;
    frame.addEventListener('load', function onL() {
      frame.removeEventListener('load', onL);
      if (gen !== curGen) return;
      clearTimeout(loadTimer);
      shimEnd(true);
      frame.classList.add('visible');
    }, { once: true });
    frame.addEventListener('error', function onE() {
      frame.removeEventListener('error', onE);
      if (gen !== curGen) return;
      clearTimeout(loadTimer);
      shimEnd(false);
      const canNext = sources.length > 1 && srcIdx < sources.length - 1;
      showErr('❌', 'Stream not working', 'This source failed to load. Try another.', canNext);
      if (canNext) setTimeout(() => { if (srcIdx === idx) { showToast('Switching to backup…'); loadSrc(idx + 1, curGen); } }, 2200);
    }, { once: true });

    frame.src = url;
    frame.classList.remove('visible');

    loadTimer = setTimeout(() => {
      if (srcIdx !== idx) return;
      shimEnd(false);
      const canNext = sources.length > 1 && srcIdx < sources.length - 1;
      showErr('⏱️', 'Stream not working', 'The connection timed out. Trying backup…', canNext);
      if (canNext) setTimeout(() => { if (srcIdx === idx) loadSrc(idx + 1, gen); }, 2000);
    }, CFG.EMBED_TIMEOUT);
  }

  return {
    mount(srcs, g) {
      sources = srcs.filter(isSafeUrl); srcIdx = 0; gen = g;
      if (!sources.length) { showErr('🔗', 'Invalid URL', 'No safe embed URL found.', false); return; }
      D.embedHost.classList.add('active');
      frame = D.embedFrame;
      D.embedReload.style.display = '';
      loadSrc(0, g);
    },
    unmount() {
      clearTimeout(loadTimer); clearInterval(shimInt); gen = -1;
      D.embedHost.classList.remove('active');
      D.embedErr.classList.remove('active');
      D.embedReload.style.display = 'none';
      try { if (frame) frame.src = 'about:blank'; } catch {}
      if (frame) frame.classList.remove('visible');
      D.shimmer.classList.remove('hidden');
      sources = []; srcIdx = 0;
    },
    retry()      { hideErr(); loadSrc(srcIdx, gen); },
    nextSource() { const n = (srcIdx + 1) % sources.length; showToast('Switching to backup…'); loadSrc(n, gen); },
  };
})();

/* ─── Proxy / fetch ─────────────────────────────────────────────────── */
async function fetchProxy(url) {
  const order = [...CFG.PROXY_SCORES.keys()].sort((a,b) => CFG.PROXY_SCORES[b] - CFG.PROXY_SCORES[a]);
  let lastErr;
  for (const i of order) {
    const pu = CFG.PROXY_FACTORIES[i](url);
    const ac = makeAbortSignal(9000);
    try {
      const res = await fetch(pu, { signal: ac.signal });
      clearTimeout(ac._t);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      let text = await res.text();
      if (pu.includes('allorigins')) { try { const j = JSON.parse(text); if (j.contents != null) text = j.contents; } catch {} }
      CFG.PROXY_SCORES[i]++;
      return text;
    } catch (e) { clearTimeout(ac._t); CFG.PROXY_SCORES[i] = Math.max(0, CFG.PROXY_SCORES[i]-1); lastErr = e; }
  }
  throw lastErr || new Error('All proxies failed');
}

/* ─── Stream resolution ─────────────────────────────────────────────── */
function cacheGet(k) {
  try { const r = JSON.parse(sessionStorage.getItem(k)); if (r && Date.now()-r._t < CFG.CACHE_TTL) return r; sessionStorage.removeItem(k); } catch {} return null;
}
function cacheSet(k,v) { try { sessionStorage.setItem(k, JSON.stringify({...v, _t: Date.now()})); } catch {} }
function cacheDel(k)   { try { sessionStorage.removeItem(k); } catch {} }

function extractManifest(html) {
  let url = null;
  const patterns = [
    /(?:file|src|manifestUri|streamUrl|hlsUrl|dashUrl|videoUrl|liveUrl)\s*[=:]\s*["'`](https?:\/\/[^"'`\s]+\.(?:m3u8|mpd)[^"'`\s]*)/i,
    /["']file["']\s*:\s*["'](https?:\/\/[^"']+\.(?:m3u8|mpd)[^"']*)/i,
    /atob\s*\(\s*["']([A-Za-z0-9+/=]{30,})["']\s*\)/g,
    /<(?:video|source)[^>]+src=["'](https?:\/\/[^"']+\.(?:m3u8|mpd)[^"']*)/i,
    /https?:\/\/[^\s"'`<>\\]+\.m3u8[^\s"'`<>\\]*/,
    /https?:\/\/[^\s"'`<>\\]+\.mpd[^\s"'`<>\\]*/,
  ];
  for (const re of patterns) {
    if (re.global) {
      let m; while ((m = re.exec(html)) !== null) {
        try { const d = atob(m[1]); if (/^https?:\/\//i.test(d) && isSafeUrl(d)) { url = d; break; } } catch {}
      }
    } else {
      const m = html.match(re);
      if (m && isSafeUrl(m[1])) { url = m[1]; break; }
    }
    if (url) break;
  }
  // iframe fallback
  if (!url) {
    const iframeRe = /<iframe[^>]+src=["']([^"']+)['"]/gi;
    const embeds = [];
    let m;
    while ((m = iframeRe.exec(html)) !== null) {
      const c = m[1].replace(/&amp;/g,'&').trim();
      if (isSafeUrl(c) && !c.includes('blogger.com') && !c.includes('google.com')) embeds.push(c);
    }
    if (embeds.length) return { isEmbed: true, embedUrls: embeds };
  }
  if (!url) return null;
  // DRM inline
  let drmKeys = null;
  if (url.includes('!!')) {
    const [mu, kp] = url.split('!!'); url = mu;
    if (kp && kp.includes(':')) { const [kid, key] = kp.split(':'); drmKeys = { keyId: kid, key }; }
  }
  if (!drmKeys) {
    const km = html.match(/"([0-9a-fA-F]{32})"\s*:\s*"([0-9a-fA-F]{32})"/);
    if (km) drmKeys = { keyId: km[1], key: km[2] };
  }
  return { streamUrl: url, drmKeys };
}

async function resolveStream(url) {
  const ck = CFG.CACHE_PFX + url;
  const cached = cacheGet(ck);
  if (cached) return cached;
  if (/\.m3u8([?&#]|$)/i.test(url)) { const r = { type:'hls', url }; cacheSet(ck,r); return r; }
  if (/\.mpd([?&#]|$)/i.test(url))  { const r = { type:'dash', url }; cacheSet(ck,r); return r; }
  return withRetry(async () => {
    const html = await fetchProxy(url);
    const ex   = extractManifest(html);
    if (!ex) throw new Error('No stream URL found');
    if (ex.isEmbed) { const r = { type:'embed', url: ex.embedUrls[0], embedUrls: ex.embedUrls }; cacheSet(ck,r); return r; }
    const { streamUrl, drmKeys } = ex;
    if (!isSafeUrl(streamUrl)) throw new Error('Unsafe URL');
    const type = /\.m3u8([?&#]|$)/i.test(streamUrl) ? 'hls' : 'dash';
    const r = { type, url: streamUrl, ...(drmKeys && { drmKeys }) };
    cacheSet(ck, r); return r;
  });
}

/* ─── Script loader ─────────────────────────────────────────────────── */
const scriptCache = new Map();
function loadScript(src) {
  if (scriptCache.has(src)) return scriptCache.get(src);
  const p = new Promise((res, rej) => {
    if (document.querySelector(`script[src="${src}"]`)) return res();
    const s = document.createElement('script'); s.src = src; s.async = true;
    s.onload = res; s.onerror = () => rej(new Error('Failed: ' + src));
    document.head.appendChild(s);
  });
  scriptCache.set(src, p); return p;
}

/* ─── Friendly error messages ────────────────────────────────────────── */
function friendlyError(raw) {
  const m = (raw || '').toLowerCase();
  if (m.includes('timeout') || m.includes('timed out'))          return { icon:'⏱️', title:'Stream not working',   msg:'The stream took too long to respond. We\'ll retry automatically.' };
  if (m.includes('network') || m.includes('failed to fetch'))    return { icon:'🌐', title:'Stream not working',   msg:'Couldn\'t reach the stream server. Check your connection.' };
  if (m.includes('cors') || m.includes('cross-origin'))          return { icon:'🔒', title:'Stream not working',   msg:'The stream server blocked this request. Trying another source…' };
  if (m.includes('drm') || m.includes('clearkey'))               return { icon:'🔑', title:'Decryption error',     msg:'Couldn\'t decrypt the protected stream. Try refreshing.' };
  if (m.includes('404') || m.includes('not found'))              return { icon:'🔍', title:'Stream unavailable',   msg:'This stream link has expired or ended. Switching to backup…' };
  if (m.includes('403') || m.includes('forbidden'))              return { icon:'🚫', title:'Stream blocked',       msg:'This stream may be geo-blocked. Try a different source.' };
  if (m.includes('not supported') || m.includes('format'))       return { icon:'📺', title:'Format not supported', msg:'Try a different browser — Chrome or Firefox work best.' };
  return { icon:'⚠️', title:'Stream not working', msg:'Something went wrong. We\'ll try another source.' };
}

/* ─── Player cleanup ─────────────────────────────────────────────────── */
function clearHost() {
  Embed.unmount();
  activeInstances.forEach(p => {
    try {
      if (typeof p.destroy  === 'function') p.destroy();
      else if (typeof p.dispose === 'function') p.dispose();
      else if (p instanceof HTMLMediaElement) { p.pause(); p.src = ''; p.load(); }
    } catch {}
  });
  activeInstances = [];
  D.host.innerHTML = '';
  D.iframe.style.display = 'none';
  currentPlayer = null; qualityHandler = null; adapterName = '';
  D.qualSelect.innerHTML = '';
  D.qualSelect.classList.remove('has-levels');
  setOverlay(false);
  D.centerPlay.classList.remove('visible');
}

/* ─── Video element factory ──────────────────────────────────────────── */
function newVideo(attrs = {}) {
  const v = document.createElement('video');
  v.style.cssText = 'width:100%;height:100%;display:block;background:#000;';
  Object.entries({ autoplay: false, playsinline: true, ...attrs }).forEach(([k, val]) => {
    if (val === true) v.setAttribute(k,''); else if (val !== false) v.setAttribute(k, val);
  });
  v.addEventListener('play',  updateCenterPlay);
  v.addEventListener('pause', updateCenterPlay);
  return v;
}
async function safePlay(v) {
  try { await v.play(); } catch (e) { if (e?.name === 'AbortError' || e?.name === 'NotAllowedError') return; throw e; }
}
function updateCenterPlay() {
  if (!currentStream || currentStream.type === 'embed') { D.centerPlay.classList.remove('visible'); return; }
  let paused = true;
  if (currentPlayer instanceof HTMLMediaElement) paused = currentPlayer.paused;
  D.centerPlay.classList.toggle('visible', paused);
}
function togglePlayPause() {
  if (!currentPlayer) return;
  if (currentPlayer instanceof HTMLMediaElement) {
    currentPlayer.paused ? safePlay(currentPlayer) : currentPlayer.pause();
    updateCenterPlay();
  }
}

/* ─── Adapters ───────────────────────────────────────────────────────── */
const ADAPTERS = [
  {
    name: 'native-hls', priority: 0,
    supports: s => s.type === 'hls' && isIOS(),
    async load() {},
    init(hid, s) {
      return withTimeout(new Promise((res, rej) => {
        const v = newVideo({ controls: true, muted: true, playsinline: true });
        v.src = s.url;
        $(hid).appendChild(v); currentPlayer = v; activeInstances.push(v);
        v.addEventListener('loadedmetadata', () => { safePlay(v); res(); }, { once: true });
        v.addEventListener('error', () => rej(new Error('Native HLS: load failed')), { once: true });
      }), 20000);
    }
  },
  {
    name: 'jwplayer', priority: 1,
    supports: () => typeof jwplayer !== 'undefined',
    async load() {},
    init(hid, s) {
      return withTimeout(new Promise((res, rej) => {
        const el = document.createElement('div'); el.id = hid + '_jw';
        $(hid).appendChild(el);
        const p = jwplayer(el.id).setup({
          file: s.url, type: s.type === 'hls' ? 'hls' : 'dash',
          width: '100%', height: '100%', autostart: !isIOS(), mute: isIOS(),
          hlshtml: true, primary: 'html5', stretching: 'uniform',
          ...(s.drmKeys ? { drm: { clearkey: { keyId: s.drmKeys.keyId, key: s.drmKeys.key } } } : {})
        });
        let ok = false;
        p.on('ready', () => {
          if (ok) return; ok = true;
          activeInstances.push(p); currentPlayer = p;
          const lvls = p.getQualityLevels();
          if (lvls?.length) setQualityLevels(lvls.map((l,i) => ({ label: l.label || `${l.height}p`, value: i })), i => p.setCurrentQuality(i));
          p.on('play',  updateCenterPlay);
          p.on('pause', updateCenterPlay);
          res();
        });
        p.on('error',      e => { if (!ok) { ok=true; rej(new Error('JWPlayer: ' + e.message)); } });
        p.on('setupError', e => { if (!ok) { ok=true; rej(new Error('JWPlayer setup: ' + e.message)); } });
      }));
    }
  },
  {
    name: 'shaka', priority: 2,
    supports: () => true,
    async load() { await loadScript('https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.compiled.min.js'); },
    init(hid, s) {
      return withTimeout(new Promise(async (res, rej) => {
        let ok = false;
        const done = fn => { if (!ok) { ok=true; fn(); } };
        const v = newVideo({ controls: true }); $(hid).appendChild(v);
        shaka.polyfill.installAll();
        if (!shaka.Player.isBrowserSupported()) return done(() => rej(new Error('Shaka: unsupported')));
        const p = new shaka.Player(v);
        activeInstances.push(p); currentPlayer = v;
        p.configure({ streaming: { retryParameters: { maxAttempts:5, baseDelay:1000, backoffFactor:2 }, jumpLargeGaps:true, stallEnabled:true }, manifest: { retryParameters: { maxAttempts:5 } } });
        p.addEventListener('error', e => done(() => rej(new Error(`Shaka: code ${e.detail?.code}`))));
        if (s.drmKeys) p.configure({ drm: { clearKeys: { [s.drmKeys.keyId]: s.drmKeys.key } } });
        try {
          await p.load(s.url);
          const tracks = p.getVariantTracks().filter(t => t.type === 'variant');
          if (tracks.length) {
            const seen = new Set(), uniq = [];
            tracks.forEach(t => { const lbl = t.height ? `${t.height}p` : `${Math.round(t.bandwidth/1000)}k`; if (!seen.has(lbl)) { seen.add(lbl); uniq.push({ label: lbl, track: t }); } });
            uniq.sort((a,b) => (a.track.bandwidth||0) - (b.track.bandwidth||0));
            setQualityLevels(uniq.map(u => ({ label: u.label, value: u.track })), tr => { p.configure({ abr:{ enabled:false } }); p.selectVariantTrack(tr, true); });
          }
          setTimeout(() => safePlay(v), 100);
          done(() => res());
        } catch (e) { done(() => rej(new Error('Shaka: ' + e.message))); }
      }));
    }
  },
  {
    name: 'hlsjs', priority: 3,
    supports: s => s.type === 'hls',
    async load() { await loadScript('https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js'); },
    init(hid, s) {
      return withTimeout(new Promise((res, rej) => {
        if (!Hls.isSupported()) return rej(new Error('HLS.js: MSE not supported'));
        const v = newVideo({ controls: true }); $(hid).appendChild(v); currentPlayer = v;
        const hls = new Hls({ enableWorker:true, lowLatencyMode:true, maxBufferLength:30, fragLoadingMaxRetry:6, startPosition:-1 });
        activeInstances.push(hls);
        let ok = false;
        hls.on(Hls.Events.ERROR, (_, d) => {
          if (!d.fatal) return;
          if (!ok) {
            if (d.type === Hls.ErrorTypes.NETWORK_ERROR) { hls.startLoad(); return; }
            if (d.type === Hls.ErrorTypes.MEDIA_ERROR)   { hls.recoverMediaError(); return; }
            ok=true; rej(new Error(`HLS.js: ${d.type}/${d.details}`));
          }
        });
        hls.loadSource(s.url);
        hls.attachMedia(v);
        hls.once(Hls.Events.MANIFEST_PARSED, () => {
          if (ok) return; ok=true;
          if (hls.levels?.length) {
            setQualityLevels(hls.levels.map((l,i) => ({ label: l.height ? `${l.height}p` : `${Math.round(l.bitrate/1000)}k`, value: i })), i => { hls.currentLevel = i; });
          }
          safePlay(v); res();
        });
      }));
    }
  },
  {
    name: 'dashjs', priority: 4,
    supports: s => s.type === 'dash',
    async load() { await loadScript('https://cdn.dashjs.org/latest/dash.all.min.js'); },
    init(hid, s) {
      return withTimeout(new Promise((res, rej) => {
        const v = newVideo({ controls: true }); $(hid).appendChild(v);
        const p = dashjs.MediaPlayer().create();
        activeInstances.push(p); currentPlayer = v;
        let ok = false;
        p.on(dashjs.MediaPlayer.events.PLAYBACK_STARTED, () => {
          if (ok) return; ok=true;
          const bl = p.getBitrateInfoListFor('video');
          if (bl?.length) setQualityLevels(bl.map((b,i) => ({ label: b.height ? `${b.height}p` : `${Math.round(b.bitrate/1000)}k`, value: i })), i => p.setQualityFor('video', i, true));
          res();
        });
        p.on(dashjs.MediaPlayer.events.ERROR, e => { if (!ok) { ok=true; rej(new Error('Dash.js: ' + (e.message||'error'))); } });
        if (s.drmKeys) p.setProtectionData({ 'org.w3.clearkey': { clearkeys: { [s.drmKeys.keyId]: s.drmKeys.key } } });
        p.initialize(v, s.url, true);
      }));
    }
  },
  {
    name: 'videojs', priority: 5,
    supports: () => true,
    async load() { await loadScript('https://vjs.zencdn.net/8.10.0/video.min.js'); },
    init(hid, s) {
      return withTimeout(new Promise((res, rej) => {
        const v = newVideo({ controls: false }); v.id = hid + '_vjs';
        $(hid).appendChild(v);
        const p = videojs(v.id, { autoplay:true, controls:true, sources:[{ src:s.url, type: s.type==='hls'?'application/x-mpegURL':'application/dash+xml' }] });
        activeInstances.push(p); currentPlayer = v;
        let ok = false;
        p.ready(() => { if (!ok) { ok=true; p.play(); res(); } });
        p.on('error', () => { if (!ok) { ok=true; rej(new Error('VideoJS: error')); } });
      }));
    }
  },
  {
    name: 'native', priority: 6,
    supports: () => true,
    async load() {},
    init(hid, s) {
      const ios = isIOS();
      return withTimeout(new Promise((res, rej) => {
        const v = newVideo({ controls:true, ...(ios && { muted:true, playsinline:true }) });
        v.src = s.url; $(hid).appendChild(v); currentPlayer = v;
        v.addEventListener(ios ? 'loadedmetadata' : 'canplay', () => { safePlay(v); res(); }, { once:true });
        v.addEventListener('error', () => rej(new Error('Native: unsupported format')), { once:true });
      }), ios ? 20000 : CFG.PLAYER_TIMEOUT);
    }
  },
];

/* ─── Auto-retry logic ───────────────────────────────────────────────── */
async function autoRetryStream(stream, gen, tryIdx = 0) {
  const MAX = CFG.MAX_RETRIES;
  if (tryIdx > 0) {
    const msg = tryIdx === 1 ? 'Stream not working — retrying…' : 'Still trying — switching to backup…';
    showRetryBar(msg);
    await new Promise(r => setTimeout(r, 1800));
  }
  hideRetryBar();

  const host = D.host;
  const candidates = ADAPTERS
    .filter(a => { try { return a.supports(stream); } catch { return false; } })
    .sort((a,b) => a.priority - b.priority);

  let succeeded = false, lastErr = '', successAdapter = '';

  for (const adapter of candidates) {
    if (gen !== playGen) return false;
    const wid = 'pw_' + Date.now();
    const wrap = document.createElement('div');
    wrap.id = wid; wrap.style.cssText = 'width:100%;height:100%;position:absolute;inset:0;background:#000;';
    host.appendChild(wrap);
    setLoading(true, `Connecting${tryIdx > 0 ? ' (attempt ' + (tryIdx+1) + ')' : ''}…`);
    try {
      await adapter.load();
      if (gen !== playGen) return false;
      await adapter.init(wid, stream);
      succeeded = true; successAdapter = adapter.name; adapterName = adapter.name;
      break;
    } catch (e) {
      lastErr = e?.message || 'Unknown';
      try { host.removeChild(wrap); } catch {}
    }
  }

  if (!succeeded) {
    if (tryIdx < MAX) {
      return autoRetryStream(stream, gen, tryIdx + 1);
    }
    // All retries exhausted
    showMainError(lastErr, {});
    return false;
  }
  return true;
}

/* ─── Play stream ────────────────────────────────────────────────────── */
async function playStream(stream, gen) {
  hideMainError(); clearHost();
  D.placeholder.style.display = 'none';
  D.host.style.display = 'none';

  if (stream.type === 'embed') {
    setLoading(false);
    const srcs = stream.embedUrls?.length ? stream.embedUrls : [stream.url];
    Embed.mount(srcs, gen);
    setBadge(stream);
    setOverlay(false);
    return;
  }

  D.host.style.display = 'block';
  const ok = await autoRetryStream(stream, gen);
  if (gen !== playGen) return;
  setLoading(false);
  hideRetryBar();

  if (ok) {
    setBadge(stream);
    const needsOverlay = !['jwplayer','embed'].includes(adapterName);
    setOverlay(needsOverlay);
    if (needsOverlay) D.playbackBar.classList.add('show');
    setTimeout(updateCenterPlay, 400);
    StreamBar.setActive(currentIndex);
  }
}

/* ─── Params ─────────────────────────────────────────────────────────── */
const moraParams  = decodeParams('mora').filter(isSafeUrl);
const embedParams = decodeParams('embed').filter(isSafeUrl);
const drmKey      = new URLSearchParams(location.search).get('drmkey') || '';

async function loadStreams() {
  const result = [];
  setLoading(true, 'Finding streams…');

  const settled = await Promise.allSettled(moraParams.map(u => resolveStream(u)));
  settled.forEach((r, i) => {
    if (r.status === 'fulfilled' && r.value) result.push({ ...r.value, originalUrl: moraParams[i] });
  });

  if (embedParams.length) {
    result.push({ type:'embed', url:embedParams[0], embedUrls:embedParams, originalUrl:embedParams[0] });
  }

  // iOS: prefer HLS first
  if (isIOS()) {
    const hls = result.filter(s => s.type === 'hls');
    const rest = result.filter(s => s.type !== 'hls');
    return [...hls, ...rest];
  }
  return result;
}

/* ─── Navigation ─────────────────────────────────────────────────────── */
async function go(idx) {
  idx = Math.max(0, Math.min(idx, streams.length - 1));
  currentIndex = idx; currentStream = streams[idx];
  const gen = ++playGen;
  retryCount = 0;
  D.btnRefresh.disabled = true;
  StreamBar.setActive(idx);
  try { localStorage.setItem(CFG.STORAGE_KEY, String(idx)); } catch {}
  try { await playStream(currentStream, gen); }
  finally { if (gen === playGen) D.btnRefresh.disabled = false; }
}

function switchNext() {
  if (!streams.length) return;
  const next = (currentIndex + 1) % streams.length;
  const lbl = streamLabel(next);
  showToast(`${lbl.icon} ${lbl.name}`);
  go(next);
}

function refresh() {
  if (!currentStream) return;
  if (currentStream.type === 'embed') { Embed.retry(); showToast('Reloading…'); return; }
  cacheDel(CFG.CACHE_PFX + currentStream.originalUrl);
  go(currentIndex);
  showToast('Refreshing ↺');
}

/* ─── Gestures ───────────────────────────────────────────────────────── */
let touchStart = null;
D.stage.addEventListener('touchstart', e => {
  const t = e.touches[0];
  touchStart = { x: t.clientX, y: t.clientY, ts: Date.now() };
}, { passive: true });
D.stage.addEventListener('touchend', e => {
  if (!touchStart) return;
  const t = e.changedTouches[0];
  const dx = t.clientX - touchStart.x, dy = t.clientY - touchStart.y, dt = Date.now() - touchStart.ts;
  touchStart = null;
  if (dt > 600 || (Math.abs(dx) < CFG.GESTURE_MIN && Math.abs(dy) < CFG.GESTURE_MIN)) return;
  if (Math.abs(dx) > Math.abs(dy)) {
    if (dx < -CFG.GESTURE_MIN) { switchNext(); showGestureHint('→ Next stream'); }
    else if (dx > CFG.GESTURE_MIN) { refresh(); showGestureHint('↺ Refreshed'); }
  } else {
    if (!D.stage.classList.contains('overlay-active')) return;
    const delta = dy < 0 ? 10 : -10;
    const nv = Math.max(0, Math.min(100, parseInt(D.volSlider.value,10) + delta));
    D.volSlider.value = String(nv);
    D.volSlider.dispatchEvent(new Event('input'));
    showGestureHint(dy < 0 ? `🔊 ${nv}%` : `🔉 ${nv}%`);
  }
}, { passive: true });

/* ─── Controls ───────────────────────────────────────────────────────── */
D.volSlider.addEventListener('input', e => {
  const v = Number(e.target.value) / 100;
  if (currentPlayer instanceof HTMLMediaElement) { currentPlayer.volume = v; currentPlayer.muted = v === 0; }
});
D.stage.addEventListener('mousemove', bumpControls);
D.stage.addEventListener('touchstart', bumpControls, { passive: true });

document.addEventListener('keydown', e => {
  if (e.target !== document.body) return;
  const k = e.key.toLowerCase();
  if (k === 's')  { e.preventDefault(); switchNext(); }
  if (k === 'r')  { e.preventDefault(); refresh(); }
  if (k === 'f')  { e.preventDefault(); SP.toggleFullscreen(); }
  if (k === ' ')  { e.preventDefault(); bumpControls(); }
  const n = parseInt(e.key, 10);
  if (!isNaN(n) && n >= 1 && n <= streams.length) { e.preventDefault(); go(n-1); }
  if (D.stage.classList.contains('overlay-active')) {
    if (k === 'arrowup')   { const nv = Math.min(100, parseInt(D.volSlider.value,10)+5); D.volSlider.value=String(nv); D.volSlider.dispatchEvent(new Event('input')); }
    if (k === 'arrowdown') { const nv = Math.max(0,   parseInt(D.volSlider.value,10)-5); D.volSlider.value=String(nv); D.volSlider.dispatchEvent(new Event('input')); }
  }
});

/* ─── Fullscreen / PiP ───────────────────────────────────────────────── */
function toggleFullscreen() {
  if (!document.fullscreenElement) D.stage.requestFullscreen().catch(() => showToast('Fullscreen not available'));
  else document.exitFullscreen();
}
function togglePiP() {
  if (!(currentPlayer instanceof HTMLVideoElement)) { showToast('PiP not available for this player'); return; }
  if (document.pictureInPictureElement) document.exitPictureInPicture();
  else currentPlayer.requestPictureInPicture().catch(() => showToast('PiP not available'));
}

/* ─── Error actions ──────────────────────────────────────────────────── */
function handleRetry() {
  if (retryCount >= CFG.MAX_RETRIES) { showToast('No more retries — try a different stream'); return; }
  retryCount++; hideMainError(); go(currentIndex);
}
function handleFallback() {
  hideMainError(); clearHost();
  D.host.style.display = 'block';
  const wrap = document.createElement('div'); wrap.className = 'fallback-wrap';
  const fu = isSafeUrl(CFG.FALLBACK_URL) ? CFG.FALLBACK_URL : '';
  wrap.innerHTML = `
    <p class="fw-title">⚠ Showing backup stream</p>
    <p>All sources failed. This is a backup channel.</p>
    ${fu ? `<iframe src="${fu}" frameborder="0" allowfullscreen sandbox="${CFG.SANDBOX}"></iframe>` : '<p>No backup available.</p>'}
  `;
  D.host.appendChild(wrap);
}

/* ─── Fallback wrap ─────────────────────────────────────────────────── */
function showFallback() { handleFallback(); }

/* ─── Public API ─────────────────────────────────────────────────────── */
const SP = window.SP = window.StreamPlayer = {
  go, switchNext, refresh, toggleFullscreen, togglePiP,
  togglePlayPause, handleRetry, handleFallback,
  retryEmbed:      () => Embed.retry(),
  nextEmbedSource: () => Embed.nextSource(),
};

/* ─── Boot ───────────────────────────────────────────────────────────── */
(async () => {
  if (!moraParams.length && !embedParams.length) {
    D.placeholder.innerHTML = '<p>No stream source provided.</p>';
    setLoading(false); return;
  }

  streams = await loadStreams();

  if (!streams.length) {
    D.placeholder.innerHTML = '<p>No playable streams found.</p>';
    showFallback(); setLoading(false); return;
  }

  StreamBar.build(streams);

  let startIdx = 0;
  try { const s = parseInt(localStorage.getItem(CFG.STORAGE_KEY),10); if (!isNaN(s) && s >= 0 && s < streams.length) startIdx = s; } catch {}

  await go(startIdx);
})();
</script>
