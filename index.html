<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Stream Player</title>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }
:root {
  --accent: #e50914;
  --font: 'Rubik', system-ui, sans-serif;
}
html, body { width:100%; height:100%; overflow:hidden; background:#000; font-family:var(--font); }

#source-bar {
  position:fixed; top:0; left:0; right:0; z-index:300;
  height:56px; background:rgba(15,15,15,0.95); backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(255,255,255,0.1);
  display:flex; align-items:center; padding:0 10px; gap:6px;
  overflow-x:auto; scrollbar-width:none;
}
#source-bar::-webkit-scrollbar { display:none; }

.source-btn {
  flex-shrink:0; padding:10px 18px; border-radius:9999px;
  background:rgba(255,255,255,0.08); color:#fff; border:none;
  font-weight:700; font-size:13px; white-space:nowrap;
  display:flex; align-items:center; gap:6px;
  box-shadow:0 2px 8px rgba(0,0,0,0.3);
  transition:all 0.2s;
}
.source-btn:hover { background:rgba(255,255,255,0.15); }
.source-btn.active { background:var(--accent); }

#stage { position:fixed; inset:0; z-index:100; background:#000; top:56px; }
#stage.fullscreen { top:0; }

#now-playing {
  position:fixed; top:68px; left:50%; transform:translateX(-50%);
  z-index:250; background:rgba(0,0,0,0.75); backdrop-filter:blur(10px);
  color:#fff; padding:6px 16px; border-radius:9999px; font-size:13px;
  display:flex; align-items:center; gap:8px; white-space:nowrap;
  box-shadow:0 4px 15px rgba(0,0,0,0.4);
  opacity:0; transition:opacity 0.3s;
}
#now-playing.visible { opacity:1; }

.live-dot { width:8px; height:8px; background:#10b981; border-radius:50%; animation:pulse 2s infinite; }

#next-btn {
  position:fixed; bottom:20px; right:20px; z-index:400;
  width:52px; height:52px; background:var(--accent); color:#fff;
  border:none; border-radius:50%; font-size:24px; display:flex;
  align-items:center; justify-content:center; box-shadow:0 6px 20px rgba(229,9,20,0.5);
  cursor:pointer;
}

#loading, #error-panel { position:absolute; inset:0; z-index:999; background:rgba(0,0,0,0.85); display:none; flex-direction:column; justify-content:center; align-items:center; }
#loading.active, #error-panel.active { display:flex; }

.spinner { width:50px; height:50px; border:4px solid rgba(255,255,255,0.2); border-top-color:#e50914; border-radius:50%; animation:spin 1s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

.source-btn.auto { background:linear-gradient(90deg,#10b981,#34d399); }
</style>
</head>
<body>

<div id="source-bar"></div>

<div id="now-playing">
  <span class="live-dot"></span>
  <span id="current-name">AUTO MODE</span>
</div>

<div id="stage">
  <iframe id="main-iframe" allow="autoplay; fullscreen" sandbox="allow-scripts allow-same-origin" allowfullscreen></iframe>
  <div id="player-host"></div>
  <div id="embed-host" style="display:none"><iframe id="embed-frame" allow="autoplay; fullscreen" allowfullscreen></iframe></div>

  <div id="loading"><div class="spinner"></div><div style="margin-top:16px;color:#ccc">Loading best stream…</div></div>

  <div id="error-panel">
    <div style="text-align:center;color:#fff">
      <div style="font-size:48px;margin-bottom:12px">⚠️</div>
      <h3 id="error-title">Stream not working</h3>
      <p id="error-message" style="margin:12px 0">Trying next stream automatically…</p>
      <button onclick="StreamPlayer.retryCurrent()" style="background:#e50914;color:#fff;padding:12px 28px;border:none;border-radius:8px;font-weight:700">Retry Now</button>
    </div>
  </div>

  <button id="next-btn" title="Next Stream" onclick="StreamPlayer.switchNext()">→</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js"></script>
<script>
'use strict';

const CONFIG = { PLAYER_TIMEOUT:12000, MAX_RETRIES:2, AUTO_FAILOVER_DELAY:1600 };

let streams = [], currentIndex = 0, isAutoMode = true, retryCount = 0, playGeneration = 0;
let currentPlayer = null, activeAdapters = [];

const DOM = {
  sourceBar: document.getElementById('source-bar'),
  nowPlaying: document.getElementById('now-playing'),
  currentName: document.getElementById('current-name'),
  stage: document.getElementById('stage'),
  loading: document.getElementById('loading'),
  errorPanel: document.getElementById('error-panel')
};

function parseParam(p) {
  const [url, name] = p.split('|').map(s=>s.trim());
  return { url, name: name || null, isDirect: /\.(m3u8|mpd)/i.test(url) };
}

function classify(url) {
  if (/\.m3u8/i.test(url)) return {type:'hls', priority:1};
  if (/\.mpd/i.test(url)) return {type:'dash', priority:2};
  return {type:'embed', priority:3};
}

function buildButtons() {
  DOM.sourceBar.innerHTML = '';

  // AUTO
  const auto = document.createElement('button');
  auto.className = 'source-btn auto';
  auto.innerHTML = `⚡ AUTO`;
  auto.onclick = () => { isAutoMode=true; autoPlayBest(); };
  DOM.sourceBar.appendChild(auto);

  streams.forEach((s,i) => {
    const btn = document.createElement('button');
    btn.className = 'source-btn';
    btn.innerHTML = `📺 ${s.name || `Stream ${i+1}`}`;
    btn.onclick = () => { isAutoMode=false; goToStream(i); };
    DOM.sourceBar.appendChild(btn);
  });

  // ALT
  const alt = document.createElement('button');
  alt.className = 'source-btn';
  alt.innerHTML = `🔄 ALT STREAM`;
  alt.onclick = () => { isAutoMode=false; goToStream(streams.length-1); };
  DOM.sourceBar.appendChild(alt);
}

function updateNowPlaying() {
  const stream = streams[currentIndex];
  DOM.currentName.textContent = isAutoMode ? 'AUTO • Best Stream' : (stream?.name || `Stream ${currentIndex+1}`);
  DOM.nowPlaying.classList.add('visible');
  setTimeout(() => DOM.nowPlaying.classList.remove('visible'), 4500);
}

async function autoPlayBest() {
  isAutoMode = true;
  buildButtons();
  updateNowPlaying();

  const ordered = [...streams.filter(s=>s.isDirect), ...streams.filter(s=>!s.isDirect)];

  for (let s of ordered) {
    currentIndex = streams.indexOf(s);
    buildButtons();
    DOM.loading.classList.add('active');
    if (await tryLoadStream(s)) {
      DOM.loading.classList.remove('active');
      updateNowPlaying();
      return;
    }
  }
  DOM.loading.classList.remove('active');
}

async function tryLoadStream(stream) {
  const gen = ++playGeneration;
  clearPlayer();

  try {
    if (stream.type === 'embed' || !stream.isDirect) {
      document.getElementById('embed-host').style.display = 'flex';
      document.getElementById('embed-frame').src = stream.url;
      await new Promise(r => setTimeout(r, 900));
      return true;
    }

    const video = document.createElement('video');
    video.style.cssText = 'width:100%;height:100%;background:#000;';
    video.autoplay = video.playsInline = video.controls = true;
    document.getElementById('player-host').appendChild(video);
    document.getElementById('player-host').style.display = 'block';

    if (stream.type === 'hls' && Hls.isSupported()) {
      const hls = new Hls();
      hls.loadSource(stream.url);
      hls.attachMedia(video);
      activeAdapters.push(hls);
    } else video.src = stream.url;

    await new Promise((res,rej) => {
      video.onloadedmetadata = res;
      setTimeout(() => rej(new Error('timeout')), CONFIG.PLAYER_TIMEOUT);
    });
    currentPlayer = video;
    return true;
  } catch(e) { return false; }
}

function clearPlayer() {
  document.getElementById('embed-host').style.display = 'none';
  document.getElementById('player-host').innerHTML = '';
  document.getElementById('player-host').style.display = 'none';
  activeAdapters.forEach(a => a?.destroy?.());
  activeAdapters = [];
  currentPlayer?.pause?.();
}

async function goToStream(i) {
  currentIndex = i;
  buildButtons();
  retryCount = 0;
  DOM.errorPanel.classList.remove('active');
  DOM.loading.classList.add('active');

  let success = false;
  while (retryCount <= CONFIG.MAX_RETRIES && !success) {
    success = await tryLoadStream(streams[currentIndex]);
    if (!success) retryCount++;
  }

  DOM.loading.classList.remove('active');
  if (success) {
    updateNowPlaying();
    // First tap = fullscreen on mobile
    if ('ontouchstart' in window) {
      DOM.stage.addEventListener('touchstart', () => {
        if (!document.fullscreenElement) DOM.stage.requestFullscreen().catch(()=>{});
      }, {once:true});
    }
  } else {
    DOM.errorPanel.classList.add('active');
    setTimeout(() => {
      const next = (currentIndex + 1) % streams.length;
      goToStream(next);
    }, CONFIG.AUTO_FAILOVER_DELAY);
  }
}

window.StreamPlayer = {
  retryCurrent: () => goToStream(currentIndex),
  switchNext: () => goToStream((currentIndex + 1) % streams.length)
}; 

// INIT
(async () => {
  const p = new URLSearchParams(location.search);
  const mora = p.getAll('mora').map(parseParam).filter(Boolean);
  const embed = p.getAll('embed').map(parseParam).filter(Boolean);

  streams = [
    ...mora.map(s => ({...s, ...classify(s.url), name: s.name || `Stream ${mora.indexOf(s)+1}`})),
    ...embed.map(s => ({...s, type:'embed', name: s.name || 'ALT STREAM'}))
  ];

  if (!streams.length) return;

  buildButtons();
  await autoPlayBest();

  // Tap video → show top bar again
  DOM.stage.addEventListener('click', () => {
    DOM.sourceBar.style.opacity = '1';
    setTimeout(() => { DOM.sourceBar.style.transition = 'opacity 0.4s'; DOM.sourceBar.style.opacity = '0.3'; }, 3000);
  });
})();
</script>
</body>
</html>
